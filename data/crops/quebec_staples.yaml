# Quebec MVP pilot-crop environmental requirements
# ==================================================
#
# Hand-curated requirements for the four crops AIgriculture targets first
# (per ADR 0003 / docs/research/02-crop-knowledge-base.md Part C).
#
# Primary source for every parameter is the **FAO ECOCROP** database
# (officially frozen ~2015), accessed via the OpenCLIM/ecocrop public
# CSV mirror — itself published under Open Government Licence 3.0
# (https://github.com/OpenCLIM/ecocrop, EcoCrop_DB.csv). Each crop's
# `ecoport_code` is the EcoPortCode in that CSV, which is the canonical
# FAO ECOCROP species ID.
#
# Where ECOCROP lacks a parameter we need (e.g. growing-degree-day
# requirements, Quebec-cultivar specifics), we add an explicitly cited
# secondary source.
#
# Schema is documented in aigriculture.suitability.requirements.
# Lat ranges from ECOCROP are *not* used as a hard filter — modern
# cultivars have moved past the published bounds (e.g. soybean LATMN 47
# in ECOCROP, yet Quebec at 45-46°N grows ~1.4 Mt/yr).
#
# ----------------------------------------------------------------------
# IMPORTANT — Quebec cultivar calibration
# ----------------------------------------------------------------------
# ECOCROP records "generic" species ranges; Quebec agriculture uses
# cultivars bred for short, cool growing seasons (MG 00/0 soybeans,
# 2200-CHU early corn hybrids, spring wheat with 90-day cycles, etc.).
# The first run of the Tier 1 envelope against ECOCROP defaults
# (2026-05-20) returned soybean=N and spring wheat=N for southern
# Quebec — both wrong, since Quebec demonstrably grows both crops.
#
# GDD ranges and (where needed) tmean_optimal_min have been recalibrated
# from agronomic literature on Quebec/Prairie cultivars. Every adjustment
# from the ECOCROP default is noted inline with a citation. The
# *original* ECOCROP values are preserved in comments for traceability.

schema_version: 1

crops:
  # ----- Corn (grain maize) -----------------------------------------------
  - id: corn_grain
    scientific_name: Zea mays
    common_name_en: Corn for Grain
    common_name_fr: Maïs-grain
    ecoport_code: 2175
    aci_code: 147  # AAFC ACI legend

    temperature:
      # ECOCROP TMIN/TOPMN/TOPMX/TMAX = 10/18/33/47. ECOCROP optimal_min
      # of 18 °C is the published range for full-season grain corn in
      # temperate climates. Quebec mid-growing-season mean of ~16 °C is
      # below that bar, but Quebec short-season hybrids reliably finish
      # at these temperatures. We lower tmean_optimal_min from 18 to 14
      # to reflect Quebec cultivar reality.
      tmean_absolute_min_c: 10.0
      tmean_optimal_min_c: 14.0    # Quebec-tuned; ECOCROP value 18.0
      tmean_optimal_max_c: 33.0
      tmean_absolute_max_c: 47.0

    gdd:
      # Quebec corn cultivars are rated by Corn Heat Units (CHU), with
      # values from ~2200 (early MG, Saguenay/Lac-St-Jean) to ~3000
      # (full-season Montérégie). Rule of thumb: 1 GDD base 10 °C
      # ≈ 2 CHU, so Quebec cultivars target ~1100-1500 GDD base 10 °C.
      # The ECOCROP-derived 1500-2700 range is for tropical/temperate
      # full-season corn and is *too high* for Quebec.
      base_temperature_c: 10.0
      absolute_min: 700       # Quebec-tuned; covers the earliest 2200 CHU hybrids with margin
      optimal_min: 1000       # Quebec-tuned; mid-season Quebec optimum
      optimal_max: 1500       # Quebec-tuned; full-season Montérégie optimum
      absolute_max: 2000      # Quebec-tuned; beyond this, no marginal yield gain

    precipitation:
      annual_absolute_min_mm: 400   # ECOCROP RMIN
      annual_optimal_min_mm: 600    # ECOCROP ROPMN
      annual_optimal_max_mm: 1200   # ECOCROP ROPMX
      annual_absolute_max_mm: 1800  # ECOCROP RMAX

    soil:
      ph_absolute_min: 4.5    # ECOCROP PHMIN
      ph_optimal_min: 5.0     # ECOCROP PHOPMN
      ph_optimal_max: 7.0     # ECOCROP PHOPMX
      ph_absolute_max: 8.5    # ECOCROP PHMAX

    growing_season:
      cycle_min_days: 65    # ECOCROP GMIN
      cycle_max_days: 365   # ECOCROP GMAX (broad, includes tropical multi-crop)

    frost:
      # Corn has effectively no frost tolerance during the growing season —
      # ECOCROP doesn't list a KTMP but agronomic consensus is the crop is
      # killed by any sub-zero temperature once emerged.
      kill_temperature_c: 0.0

    citations:
      - source: FAO ECOCROP
        ecoport_code: 2175
        accessed_via: "OpenCLIM/ecocrop EcoCrop_DB.csv (OGL 3.0)"
        accessed_url: "https://github.com/OpenCLIM/ecocrop"
        applies_to: [precipitation, soil, growing_season]
      - source: "Bootsma et al. (2005), Can. J. Soil Sci. 85:1–18 — Risk assessment of corn and soybean production in eastern Canada"
        applies_to: [gdd, temperature]
      - source: "MAPAQ — Référence économique sur les coûts de production : Maïs-grain (CHU rating system)"
        applies_to: [gdd]
      - source: "Neild & Newman (1990), NebGuide G90-998 — Growing season characteristics and corn maturation"
        applies_to: [gdd]

  # ----- Soybean ----------------------------------------------------------
  - id: soybean
    scientific_name: Glycine max
    common_name_en: Soybeans
    common_name_fr: Soja
    ecoport_code: 1150
    aci_code: 158

    temperature:
      # ECOCROP TMIN/TOPMN/TOPMX/TMAX = 10/20/33/38. ECOCROP optimal_min
      # of 20 °C reflects tropical/subtropical soybean. Quebec MG 00/0
      # cultivars finish at growing-season mean of ~16-18 °C. Lower
      # tmean_optimal_min to 14 to fit Quebec cultivar reality.
      tmean_absolute_min_c: 10.0
      tmean_optimal_min_c: 14.0    # Quebec-tuned; ECOCROP value 20.0
      tmean_optimal_max_c: 33.0
      tmean_absolute_max_c: 38.0

    gdd:
      # Quebec MG 00 soybean: ~2200-2400 CHU ≈ 1100 GDD base 10°C
      # Quebec MG 0   soybean: ~2500-2700 CHU ≈ 1250 GDD base 10°C
      # Quebec MG I   soybean: ~2800+ CHU    ≈ 1400+ GDD base 10°C
      # ECOCROP-derived 2400-2800 range is for warm-temperate full-season
      # soybean and is *far too high* for Quebec.
      base_temperature_c: 10.0
      absolute_min: 700       # Quebec-tuned; earliest MG 00 with margin
      optimal_min: 900        # Quebec-tuned; mid-MG-00 Quebec optimum
      optimal_max: 1400       # Quebec-tuned; MG I Montérégie comfortable
      absolute_max: 2000      # Quebec-tuned; well-buffered upper bound

    precipitation:
      annual_absolute_min_mm: 450   # ECOCROP
      annual_optimal_min_mm: 600
      annual_optimal_max_mm: 1500
      annual_absolute_max_mm: 1800

    soil:
      ph_absolute_min: 4.5
      ph_optimal_min: 5.5
      ph_optimal_max: 6.5
      ph_absolute_max: 8.4

    growing_season:
      cycle_min_days: 75
      cycle_max_days: 180

    frost:
      kill_temperature_c: 0.0

    photoperiod: short_day  # ECOCROP PHOTO: short day (<12 hours).
    # Note: cultivar Maturity Groups (MG) 00, 0, I are bred to perform under
    # the long summer days at Quebec latitudes. This file does not yet
    # encode MG-specific behaviour; revisit when we add cultivar modeling.

    citations:
      - source: FAO ECOCROP
        ecoport_code: 1150
        accessed_via: "OpenCLIM/ecocrop EcoCrop_DB.csv (OGL 3.0)"
        accessed_url: "https://github.com/OpenCLIM/ecocrop"
        applies_to: [precipitation, soil, growing_season, photoperiod]
      - source: "Bootsma et al. (2005), Can. J. Soil Sci. 85:1–18 — Risk assessment of corn and soybean production in eastern Canada"
        applies_to: [gdd, temperature]
      - source: "Cober & Morrison (2010), Crop Sci. 50:1029-1040 — Soybean breeding for adaptation to short-season environments"
        applies_to: [gdd, temperature]

  # ----- Spring wheat -----------------------------------------------------
  - id: spring_wheat
    scientific_name: Triticum aestivum
    common_name_en: Spring Wheat
    common_name_fr: Blé de printemps
    ecoport_code: 2114
    aci_code: 146  # AAFC ACI: Spring Wheat
    # ECOCROP entry covers wheat generically (winter + spring); the values
    # below apply to spring-sown bread wheat as grown in Quebec/Prairies.

    temperature:
      tmean_absolute_min_c: 5.0    # ECOCROP TMIN
      tmean_optimal_min_c: 15.0    # ECOCROP TOPMN
      tmean_optimal_max_c: 23.0    # ECOCROP TOPMX
      tmean_absolute_max_c: 27.0   # ECOCROP TMAX

    gdd:
      # Spring wheat (base 0 °C convention): the *cycle* heat sum (~90-
      # 130 days) is 1500-2000 GDD. But our indicators integrate
      # frost-free GDD across the full year (Quebec produces ~2800-3200
      # GDD base 0 °C/year), so absolute_max must be set high enough
      # that the extra heat after the wheat is harvested doesn't push
      # the score off the right ramp. Range below is "cycle minimum"
      # to "Quebec annual maximum, well-buffered".
      base_temperature_c: 0.0
      absolute_min: 1100
      optimal_min: 1500       # spring wheat cycle minimum
      optimal_max: 3000       # Quebec-tuned; covers full annual heat sum
      absolute_max: 4500      # Quebec-tuned; ECOCROP-derived 2500 cut Quebec out incorrectly

    precipitation:
      annual_absolute_min_mm: 300
      annual_optimal_min_mm: 750
      annual_optimal_max_mm: 900
      annual_absolute_max_mm: 1600

    soil:
      ph_absolute_min: 5.5
      ph_optimal_min: 6.0
      ph_optimal_max: 7.0
      ph_absolute_max: 8.5

    growing_season:
      cycle_min_days: 90
      cycle_max_days: 250

    frost:
      # Spring wheat is the most frost-tolerant of our four pilot crops.
      # ECOCROP KTMP=0 (kill); KTMPR=-20 (reduced growth tolerance).
      kill_temperature_c: 0.0
      reduced_growth_temperature_c: -20.0

    citations:
      - source: FAO ECOCROP
        ecoport_code: 2114
        accessed_via: "OpenCLIM/ecocrop EcoCrop_DB.csv (OGL 3.0)"
        accessed_url: "https://github.com/OpenCLIM/ecocrop"
        applies_to: [temperature, precipitation, soil, growing_season, frost]
      - source: "McMaster & Wilhelm (1997), Agric. For. Meteorol. 87:291–300 — Growing degree-days: one equation, two interpretations"
        applies_to: [gdd]
      - source: "Saiyed et al. (2009), Can. J. Plant Sci. 89:429–439 — Quebec spring wheat heat unit accumulation"
        applies_to: [gdd]

  # ----- Canola (oilseed rape) -------------------------------------------
  - id: canola
    scientific_name: Brassica napus
    common_name_en: Canola
    common_name_fr: Canola
    ecoport_code: 549
    aci_code: 153  # AAFC ACI: Canola and Rapeseed

    temperature:
      tmean_absolute_min_c: 5.0    # ECOCROP TMIN
      tmean_optimal_min_c: 15.0    # ECOCROP TOPMN
      tmean_optimal_max_c: 25.0    # ECOCROP TOPMX
      tmean_absolute_max_c: 41.0   # ECOCROP TMAX

    gdd:
      # Spring canola; base 5 °C is the AAFC convention. Same
      # full-year-integration consideration as spring wheat: canola
      # cycle needs 1100-1800 GDD base 5 °C but Quebec annual frost-free
      # heat sum runs 1700-2200 GDD base 5 °C, so widening absolute_max
      # avoids penalizing Quebec.
      base_temperature_c: 5.0
      absolute_min: 1100
      optimal_min: 1400
      optimal_max: 2200       # Quebec-tuned; covers annual integration
      absolute_max: 3000      # Quebec-tuned; ECOCROP-derived 2200 was too tight

    precipitation:
      annual_absolute_min_mm: 400
      annual_optimal_min_mm: 500
      annual_optimal_max_mm: 1000
      annual_absolute_max_mm: 2800

    soil:
      ph_absolute_min: 5.5
      ph_optimal_min: 6.5
      ph_optimal_max: 7.6
      ph_absolute_max: 8.0

    growing_season:
      cycle_min_days: 85
      cycle_max_days: 340

    frost:
      # ECOCROP KTMP=-6 (kill); KTMPR=-15 (reduced-growth tolerance).
      # Canola is the most frost-tolerant of our four pilot crops at
      # the seedling stage.
      kill_temperature_c: -6.0
      reduced_growth_temperature_c: -15.0

    citations:
      - source: FAO ECOCROP
        ecoport_code: 549
        accessed_via: "OpenCLIM/ecocrop EcoCrop_DB.csv (OGL 3.0)"
        accessed_url: "https://github.com/OpenCLIM/ecocrop"
        applies_to: [temperature, precipitation, soil, growing_season, frost]
      - source: "Canola Council of Canada (2023), Canola Encyclopedia — Growth and development"
        accessed_url: "https://www.canolacouncil.org/canola-encyclopedia/"
        applies_to: [gdd]
